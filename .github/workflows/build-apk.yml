name: Build and Release Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Web Assets
        run: |
          mkdir dist
          cp -r css img js *.html dist/
          sed -i "s/const CURRENT_APP_VERSION = \"[^\"]*\";/const CURRENT_APP_VERSION = \"1.0.${{ github.run_number }}\";/g" dist/js/update-checker.js

      - name: Install Android Project Dependencies
        working-directory: ./android-app
        run: npm ci || npm install

      - name: Sync Capacitor
        working-directory: ./android-app
        run: npx cap sync android

      - name: Build Android APK
        working-directory: ./android-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PencaMundial2026-debug.apk
          path: ./android-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./android-app/android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Actualización v1.0.${{ github.run_number }}"
          body: "Nueva versión compilada automáticamente."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
